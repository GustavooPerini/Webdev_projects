<!DOCTYPE html>

<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Conversosr de temperatura</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        
        <div id="container">

            <div id="top">
                <h1>Conversor de Temperatura</h1>
            </div>

            <label for="temp">Temperatura:</label>
            <input type="number" id="temp"> <br><br>

            <input type="radio" id="celToFah" name="check">
            <label for="celToFah">Celsius ➡ Fahrenheit</label>
            <br>
            <input type="radio" id="fahToCel" name="check">
            <label for="fahToCel">Fahrenheit ➡ Celsius</label> <br><br><br>

            <button id="button" onclick= converter()>Converter</button>
            
            <p id="result">0</p>

        </div>

        <script src="index.js"></script>
    </body>
</html>
